=============================================================================
--- System Errors - 5xx Codes ---
=============================================================================
INTERNAL_SERVER_ERROR=A technical error has occurred. Please try again later or contact the administrator.
RESOURCE_NOT_FOUND=The requested data does not exist on the system.
VALIDATION_FAILED=Invalid input data. Please check again.

=============================================================================
--- Auth & Security - 401, 403 Codes ---
=============================================================================
AUTH_FAILED=Incorrect username or password.
AUTH_INVALID_CREDENTIALS=Invalid login credentials.
ACCESS_DENIED=You do not have permission to perform this action.

=============================================================================
--- Business/Domain Errors - 400, 409, 422 Codes ---
=============================================================================
1. USER
USER_ALREADY_EXISTS=Username "{0}" already exists. Please choose another name.
USER_NOT_EXISTED=User does not exist.
USER_NOT_FOUND=Requested user not found.
EMAIL_ALREADY_EXISTS=Email {0} is already registered by another account.

2. ROLE
ROLE_ALREADY_EXISTS=Role "{0}" already exists in the system.
ROLE_NOT_FOUND=Requested role not found.

3. CATEGORY
CATEGORY_NOT_FOUND=Requested category not found.
CATEGORY_ALREADY_EXISTS=Category "{0}" already exists.
CATEGORY_CANNOT_MOVE_TO_CHILD=Cannot move category "{0}" into its own child category.
CATEGORY_CANNOT_DELETE_WITH_CHILD=Cannot delete category "{0}" because it contains sub-categories.

4. PRODUCT
PRODUCT_NOT_EXISTS=Product does not exist.
PRODUCT_NOT_FOUND=Requested product not found.
PRODUCT_ALREADY_EXISTS=Product "{0}" already exists.
SKU_NOT_FOUND=No product found with SKU "{0}".

4. INVENTORY
OUT_OF_STOCK=Product "{0}" is out of stock (quantity is 0).
STOCK_SHORTAGE=Product "{0}" has insufficient stock (Requested: {1}, Available: {2}).
SKU_ALREADY_EXISTS=SKU code "{0}" already exists.
PRODUCT_NOT_IN_WAREHOUSE=Product "{0}" is not in the inventory list of "{1}".

5. WAREHOUSE
WAREHOUSE_NOT_EXISTS=Warehouse does not exist.
WAREHOUSE_NOT_FOUND=Requested warehouse not found.
INSUFFICIENT_RESOURCES=Insufficient stock quantity to perform this operation.
LOCATION_FULL=Storage location "{0}" is full.
LOCATION_ALREADY_EXISTS=Location code "{0}" is already in use.
ORDER_LOCKED=Order "{0}" is locked and cannot be modified.

=============================================================================
--- Success Messages ---
=============================================================================
REGISTER_SUCCESS=User "{0}" registered successfully.
AUTH_SUCCESS=User "{0}" logged in successfully.
GET_SUCCESS=Data retrieved successfully.
CREATE_SUCCESS=Data created successfully.
UPDATE_SUCCESS=Data updated successfully.
DELETE_SUCCESS=Data deleted successfully.
IMPORT_SUCCESS=Stock-in for shipment "{0}" completed successfully.
EXPORT_SUCCESS=Stock-out for order "{0}" completed successfully.