# =============================================================================
# --- Hệ thống (System Errors) - Mã 5xx ---
# =============================================================================
INTERNAL_SERVER_ERROR=Hệ thống đang gặp sự cố kỹ thuật. Vui lòng thử lại sau hoặc liên hệ quản trị viên.
RESOURCE_NOT_FOUND=Dữ liệu yêu cầu không tồn tại trên hệ thống.
VALIDATION_FAILED=Dữ liệu đầu vào không hợp lệ. Vui lòng kiểm tra lại.

# =============================================================================
# --- Xác thực & Bảo mật (Auth & Security) - Mã 401, 403 ---
# =============================================================================
AUTH_FAILED=Tài khoản hoặc mật khẩu không chính xác.
AUTH_INVALID_CREDENTIALS=Thông tin đăng nhập không hợp lệ.
ACCESS_DENIED=Bạn không có quyền thực hiện hành động này.

# =============================================================================
# --- Nghiệp vụ (Business/Domain Errors) - Mã 400, 409, 422 ---
# =============================================================================

# 1. USER
USER_ALREADY_EXISTS=Tên đăng nhập "{0}" đã tồn tại trong hệ thống. Vui lòng chọn tên khác.
USER_NOT_EXISTED=Người dùng không tồn tại.
USER_NOT_FOUND=Không tìm được người dùng yêu cầu.
EMAIL_ALREADY_EXISTS=Email {0} đã được đăng ký bởi một tài khoản khác.

# 2. ROLE
ROLE_ALREADY_EXISTS=Vai trò "{0}" đã tồn tại trong hệ thống.
ROLE_NOT_FOUND=Không tìm thấy vai trò yêu cầu.

# 3. CATEGORY
CATEGORY_NOT_FOUND=Không tìm thấy danh mục yêu cầu.
CATEGORY_ALREADY_EXISTS=Danh mục "{0}" đã tồn tại.
CATEGORY_CANNOT_MOVE_TO_CHILD=Không thể di chuyển danh mục "{0}" vào chính con của nó.
CATEGORY_CANNOT_DELETE_WITH_CHILD=Không thể xoá danh mục "{0}" vì nó có chứa danh mục con.

# 4. PRODUCT
PRODUCT_NOT_EXISTS=Sản phẩm không tồn tại.
PRODUCT_NOT_FOUND=Không tìm thấy sản phẩm yêu cầu.
PRODUCT_ALREADY_EXISTS=Sản phẩm "{0}" đã tồn tại.
SKU_NOT_FOUND=Không tìm thấy sản phẩm với mã SKU "{0}".


# 4. INVENTORY (Tồn kho)
OUT_OF_STOCK=Sản phẩm "{0}" đã hết hàng (số lượng bằng 0).
STOCK_SHORTAGE=Sản phẩm "{0}" hiện không đủ tồn kho (Cần: {1}, Có: {2}).
SKU_ALREADY_EXISTS=Mã sản phẩm (SKU) "{0}" đã tồn tại.
PRODUCT_NOT_IN_WAREHOUSE=Sản phẩm "{0}" hiện không có trong danh sách tồn kho của "{1}".

# 5. WAREHOUSE (Kho hàng)
WAREHOUSE_NOT_EXISTS= Kho hàng không tồn tại.
WAREHOUSE_NOT_FOUND=Không tìm thấy kho hàng yêu cầu.
INSUFFICIENT_RESOURCES=Số lượng hàng trong kho không đủ để thực hiện thao tác này.
LOCATION_FULL=Vị trí kho "{0}" đã đầy, không thể chứa thêm hàng.
LOCATION_ALREADY_EXISTS=Mã vị trí kho "{0}" đã được sử dụng.
ORDER_LOCKED=Đơn hàng "{0}" đã chốt, không thể thay đổi dữ liệu.

# =============================================================================
# --- Thông báo thành công (Success Messages) ---
# =============================================================================
REGISTER_SUCCESS=Đăng ký người dùng "{0}" thành công.
AUTH_SUCCESS=Đăng nhập người dùng "{0}" thành công.
GET_SUCCESS=Lấy dữ liệu thành công.
CREATE_SUCCESS=Tạo mới dữ liệu thành công.
UPDATE_SUCCESS=Cập nhật dữ liệu thành công.
DELETE_SUCCESS=Đã xoá dữ liệu thành công.
IMPORT_SUCCESS=Nhập kho lô hàng "{0}" thành công.
EXPORT_SUCCESS=Xuất kho đơn hàng "{0}" thành công.